<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth & Dare Game 🎲</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

<header class="header">
    <h1>🎲 Truth & Dare 😈</h1>
    <p class="subtitle">Spin the bottle and take your challenge!</p>
</header>

<main class="main">

    <section class="output-box" aria-live="polite">
        <h2 id="text">Click the bottle to start 🎯</h2>
    </section>

    <section class="controls">
        <button id="truthBtn" class="btn truth" aria-label="Choose Truth">Truth</button>
        <button id="dareBtn" class="btn dare" aria-label="Choose Dare">Dare</button>
    </section>

    <section class="game-area">

        <div class="player top">Aarav</div>
        <div class="player right">Shreya</div>
        <div class="player bottom">Harshita</div>
        <div class="player left">Abid</div>

        <div class="bottle-container">
            <img id="bottle" src="Gold-Prosecco-Spum-DOC-Bottega-Wine-300x400.png" alt="Spinning bottle for Truth and Dare game">
        </div>

    </section>

    <section class="instructions">
        <p>👉 Click the bottle to spin</p>
        <p>👉 Choose Truth or Dare when it stops</p>
    </section>

</main>

<footer class="footer">
    <p>Made with ❤️ | Fun Game Project</p>
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
